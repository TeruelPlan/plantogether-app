name: plantogether_app
description: PlanTogether — collaborative travel planning app (iOS, Android, Web)
version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # HTTP + Auth
  dio: ^5.4.3
  flutter_secure_storage: ^10.0.0

  # WebSocket (STOMP)
  stomp_dart_client: ^3.0.0

  # Local storage
  shared_preferences: ^2.2.3

  # QR code + sharing
  qr_flutter: ^4.1.0
  share_plus: ^10.0.0

  # UI
  material_color_utilities: ^0.13.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  intl: ^0.20.2

  # Firebase (FCM)
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  # Utilities
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  logger: ^2.3.0
  uuid: ^4.4.0
  bloc_concurrency: ^0.3.0

  # Integration test driver (Marionette MCP)
  marionette_flutter: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^3.2.5
  mocktail: ^1.0.3
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  # fonts: fonts will be added when the Inter font files are added to assets/fonts/
